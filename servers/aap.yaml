name: aap

# repo: https://github.com/ansible/aap-mcp-server
# setup: npm install
# start: npm start

transport: http
endpoint: ${MCP_ENDPOINT:-http://localhost:3000/mcp}
ssl_verify: false
headers:
  Authorization: "Bearer ${AAP_TOKEN}"

models:
  - anthropic:claude-sonnet-4-6
  - openai:gpt-4o

coverage: all
threshold: 0.7
repeats: 3
metrics:
  - tool_correctness

test_cases:
  - id: AAP01-easy
    query: "List my available job templates."
    expected_tool: job_templates_list
    category: easy

  - id: AAP01-hard
    query: "I'm looking for all the predefined work configurations I can use to set up tasks."
    expected_tool: job_templates_list
    category: hard

  - id: AAP02-easy
    query: "Show me all available workflow job templates."
    expected_tool: workflow_job_templates_list
    category: easy

  - id: AAP02-hard
    query: "I'm looking for examples of automated process configurations that I can use to build my own pipelines."
    expected_tool: workflow_job_templates_list
    category: hard

  - id: AAP03-easy
    query: "List all available jobs."
    expected_tool: jobs_list
    category: easy

  - id: AAP04-easy
    query: "What items are available in our inventory?"
    expected_tool: inventories_list
    category: easy

  - id: AAP05-easy
    query: "Give me a list of hosts."
    expected_tool: hosts_list
    category: easy

  - id: AAP05-hard
    query: "What machines are currently registered in our network inventory?"
    expected_tool: hosts_list
    category: hard

  - id: AAP06-easy
    query: "What credentials do I have access to?"
    expected_tool: credentials_list
    category: easy

  - id: AAP06-hard
    query: "Show me the list of my saved logins and API keys."
    expected_tool: credentials_list
    category: hard

  - id: AAP07-easy
    query: "List all users in my team."
    expected_tool: users_list
    category: easy

  - id: AAP07-hard
    query: "Who are everyone else that has access to this account?"
    expected_tool: users_list
    category: hard

  - id: AAP08-easy
    query: "List all my activation instances along with their start and end times."
    expected_tool: activation_instances_list
    category: easy

  - id: AAP08-hard
    query: "Give me details about when I started running these processes, showing both the queue status and completion dates."
    expected_tool: activation_instances_list
    category: hard

  - id: AAP09-easy
    query: "List all my projects."
    expected_tool: projects_list
    category: easy

  - id: AAP10-easy
    query: "Show me recent workflow jobs."
    expected_tool: workflow_jobs_list
    category: easy

  - id: AAP11-easy
    query: "List all host groups."
    expected_tool: groups_list
    category: easy

  - id: AAP12-easy
    query: "Show me the instance groups."
    expected_tool: instance_groups_list
    category: easy

  - id: AAP13-easy
    query: "Show me recent activity."
    expected_tool: activity_stream_list
    category: easy

  - id: AAP14-easy
    query: "What credential types are available?"
    expected_tool: credential_types_list
    category: easy

  - id: AAP15-easy
    query: "List all execution environments."
    expected_tool: execution_environments_list
    category: easy

  - id: AAP16-easy
    query: "Show me notification templates."
    expected_tool: notification_templates_list
    category: easy

  - id: AAP17-easy
    query: "List all settings."
    expected_tool: settings_list
    category: easy

  - id: AAP18-easy
    query: "Show me all teams."
    expected_tool: teams_list
    category: easy

  - id: AAP19-easy
    query: "List all organizations."
    expected_tool: organizations_list
    category: easy

  - id: AAP20-easy
    query: "What roles are available?"
    expected_tool: role_definitions_list
    category: easy

  - id: AAP21-easy
    query: "Who am I?"
    expected_tool: me_list
    category: easy

  - id: AAP22-easy
    query: "List configured authenticators."
    expected_tool: authenticators_list
    category: easy

  - id: AAP23-easy
    query: "Show me details about my instances."
    expected_tool: instances_retrieve
    category: easy

  - id: AAP24-easy
    query: "Show me the controller configuration."
    expected_tool: config_retrieve
    category: easy

  - id: AAP25-easy
    query: "What's the gateway status?"
    expected_tool: status_retrieve
    category: easy

  - id: AAP26-easy
    query: "Show me the variables for my hosts."
    expected_tool: hosts_variable_data_retrieve
    category: easy

  - id: AAP27-easy
    query: "Sync my inventory sources."
    expected_tool: inventory_sources_update_create
    category: easy

  - id: AAP28-easy
    query: "Show me the automation mesh topology."
    expected_tool: mesh_visualizer_retrieve
    category: easy
